<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Your File</title>
    <style>
        /* Base styles */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Modern gradient background */
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: #333;
        }

        /* Card design */
        .download-card {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 100%;
            max-width: 350px;
            transition: transform 0.3s ease;
        }

        .download-card:hover {
            transform: translateY(-5px);
        }

        /* Icon styling */
        .icon-container {
            width: 70px;
            height: 70px;
            background-color: #f0f4ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
        }

        .icon-container svg {
            width: 35px;
            height: 35px;
            fill: #6e8efb;
        }

        /* Typography */
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #222;
        }

        p {
            margin: 0 0 20px 0;
            font-size: 15px;
            color: #666;
            line-height: 1.5;
        }

        .file-info {
            font-size: 13px;
            color: #999;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* Button styling */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 8px 15px rgba(110, 142, 251, 0.4);
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            box-shadow: 0 15px 20px rgba(110, 142, 251, 0.6);
            transform: translateY(-2px);
        }

        .download-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
    </style>
</head>
<body>

    <div class="download-card">
        <!-- Big decorative icon -->
        <div class="icon-container">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm9-2v6H3v-6H1v8h22v-8h-2z"/>
            </svg>
        </div>

        <h1>Your File is Ready</h1>
        <p>Click the button below to start your secure download securely.</p>
        
        <!-- Optional: You can put your file size or version here -->
        <div class="file-info">Filename.zip • 15.4 MB</div>

        <!-- REPACE "your-file.zip" WITH YOUR ACTUAL FILE NAME -->
        <a href="your-file.zip" download class="download-btn">
            <!-- Small icon inside button -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Download Now
        </a>
    </div>

</body>
</html>
